name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION_LDFLAGS: >-
    -X main.version=dev
    -X main.commit=${{ github.sha }}
    -X main.buildDate=${{ github.event.head_commit.timestamp || github.run_id }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (fmt + vet + test + build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm --dir web install --frozen-lockfile

      - name: Build frontend (produces cmd/insights/static/dist for go:embed)
        run: pnpm --dir web build

      - name: Format check (gofmt)
        run: |
          out=$(gofmt -l cmd/insights)
          if [ -n "$out" ]; then echo "::error::需要 gofmt:$out"; exit 1; fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: make test

      - name: Build
        run: make build

  cross-build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        run: pnpm --dir web install --frozen-lockfile && pnpm --dir web build

      - name: Cross build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          ext=""
          if [[ "${GOOS}" == "windows" ]]; then ext=".exe"; fi
          out="dist/cc-insights-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -tags=prod -ldflags "${GO_VERSION_LDFLAGS} -s -w" -o "${out}" ./cmd/insights

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-insights-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
