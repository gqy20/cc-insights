# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# Install: pip install pre-commit
# Setup: pre-commit install

repos:
  # Standard pre-commit hooks (latest: v6.0.0)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-toml

  # Golang hooks (actively maintained, latest: v1.0.0-rc.4)
  # Alternative to the archived dnephin/pre-commit-golang
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      # Code formatting
      - id: go-fmt
        args: [-s]

      # Module management
      - id: go-mod-tidy-repo

      # Note: go-vet-repo-pkg and go-build-repo-pkg disabled due to
      # pre-commit environment limitations with Go module cache.
      # Use `make build` and `make test` for full build verification.

      # Testing (repo-level, optional - can be slow)
      # - id: go-test-repo-pkg

  # Conventional Commits 提交信息校验（commit-msg 阶段）
  # 规范：feat/fix/docs/style/refactor/perf/test/build/ci/chore/revert
  # 格式：<type>(<scope>): <subject>，详见 https://www.conventionalcommits.org
  # 首次使用需单独安装该类型钩子：
  #   pre-commit install --hook-type commit-msg
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
