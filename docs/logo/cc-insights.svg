<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-labelledby="title">
  <title id="title">cc-insights</title>
  <!--
    cc-insights logo · 终端脉冲
    ❯ 提示符引出一条诊断脉冲折线,峰顶的赤陶橙高亮点 = 定位到的异常/证据。
    上臂与脉冲合并为一条连续路径(消除尖端双圆头叠加);下臂单独成段构成 ❯。
    线条用 currentColor 自适应底色(浅底深线/深底线浅);高亮点固定品牌赤陶橙 #C15F3C。
    图形收在画布中心 ~55%,四周均匀留白 ~28%(safe area);峰顶左右对称(dx=5)。
  -->
  <g stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 提示符上臂 + 诊断脉冲(平→急升尖峰→落→平→末端小翘) -->
    <polyline points="18,32 25,39 30,39 35,27 40,39 44,39 47,34"/>
    <!-- 提示符 ❯ 下臂 -->
    <polyline points="25,39 18,46"/>
  </g>
  <!-- 峰顶高亮点 = 定位到的证据 -->
  <circle cx="35" cy="27" r="9" fill="#C15F3C" opacity="0.16"/>
  <circle cx="35" cy="27" r="5" fill="#C15F3C"/>
</svg>
