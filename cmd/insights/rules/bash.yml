version: 1

families:
  - name: shell
    priority: 100
    commands:
      - cd
      - pwd
      - echo
      - printf
      - env
      - export
      - source
      - sh
      - bash
      - zsh
      - "true"
      - "false"
      - time
      - nice
      - timeout
      - for
      - while
      - if
      - case
      - do
      - done

  - name: wrapper
    priority: 100
    commands:
      - brun

  - name: test
    priority: 80
    contains:
      - go test
      - npm test
      - pnpm test
      - bun test
      - pytest
      - vitest
      - jest
      - cargo test
      - playwright

  - name: build
    priority: 70
    commands:
      - make
    contains:
      - go build
      - cargo build
      - npm run build
      - pnpm build

  - name: dependency
    priority: 60
    commands:
      - uv
      - uvx
      - pip
      - pipx
      - poetry
      - conda
    contains:
      - npm install
      - pnpm install
      - yarn install
      - bun install
      - uv sync
      - uv pip
      - pip install
      - poetry install
      - go mod
      - install
      - sync

  - name: git
    priority: 90
    commands:
      - git
      - gh
    command_contains:
      - git
    contains:
      - " git "

  - name: network
    priority: 90
    commands:
      - curl
      - wget
    contains:
      - http://
      - https://

  - name: python
    priority: 50
    commands:
      - python
      - python3
    contains:
      - python -c
      - python3 -c

  - name: go
    priority: 50
    commands:
      - go

  - name: rust
    priority: 50
    commands:
      - cargo
    contains:
      - cargo run

  - name: javascript
    priority: 50
    commands:
      - node
      - npm
      - pnpm
      - bun
      - yarn
      - npx
      - pnpx
      - bunx
      - corepack
      - tsc
      - eslint
      - vite
      - next

  - name: container
    priority: 90
    commands:
      - docker
      - docker-compose
      - podman
      - kubectl
      - helm

  - name: file/text
    priority: 100
    commands:
      - ls
      - cat
      - sed
      - grep
      - rg
      - find
      - head
      - tail
      - awk
      - xargs
      - sort
      - wc
      - cut
      - tr
      - uniq
      - tee
      - join

  - name: process
    priority: 100
    commands:
      - ps
      - kill
      - sleep

  - name: cleanup
    priority: 100
    commands:
      - rm
      - rmdir
    command_regex:
      - "^sudo\\s+rm$"
